name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["main", "master", "develop"]

permissions:
  contents: read

jobs:
  quality-and-tests:
    name: Quality and Tests (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.24.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./... -count=1 -v

      - name: Coverage profile
        run: go test ./... -count=1 -coverprofile=coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.go-version }}
          path: coverage.out

  benchmark-smoke:
    name: Benchmark Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Benchmark smoke run
        run: |
          go test ./benchmark -run '^$' -bench 'BenchmarkVM' -benchtime=100ms -count=1 | tee benchmark-smoke.txt

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-smoke
          path: benchmark-smoke.txt
